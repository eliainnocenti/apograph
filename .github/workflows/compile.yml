# =============================================================================
# compile.yml — Compile all apograph templates on every push.
#
# Uses xu-cheng/latex-action for LaTeX compilation.
# Sets TEXINPUTS to include shared/latex/ so \usepackage{apograph-math} works.
# Uploads compiled PDFs as GitHub Actions artifacts.
# =============================================================================

name: Compile Templates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: compile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Discover templates from CATALOG.json
  # ---------------------------------------------------------------------------
  discover:
    name: Discover templates
    runs-on: ubuntu-latest
    outputs:
      latex_matrix: ${{ steps.set-matrix.outputs.latex_matrix }}
      has_latex: ${{ steps.set-matrix.outputs.has_latex }}
      typst_matrix: ${{ steps.set-matrix.outputs.typst_matrix }}
      has_typst: ${{ steps.set-matrix.outputs.has_typst }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate catalog and repository metadata
        run: |
          python3 scripts/catalog.py validate
          python3 scripts/catalog.py generate-readme --check

      - name: Build matrix from CATALOG.json
        id: set-matrix
        run: |
          # Extract template entries and build a JSON matrix
          python3 -c "
          import json
          with open('CATALOG.json') as f:
              catalog = json.load(f)
          latex_entries = []
          typst_entries = []
          for t in catalog['templates']:
              if t.get('status') not in ('beta', 'stable'):
                  continue
              template_format = t.get('format', 'latex')
              for entrypoint in t.get('entrypoints', []):
                  if entrypoint.get('role') == 'test':
                      continue
                  entry = {
                      'id': f"{t['id']}--{entrypoint['role']}",
                      'template_id': t['id'],
                      'source_dir': t['source_dir'],
                      'main_file': entrypoint['path'],
                      'compiler': t.get('compiler', 'pdflatex'),
                      'format': template_format,
                  }
                  if template_format == 'latex':
                      latex_entries.append(entry)
                  elif template_format == 'typst':
                      typst_entries.append(entry)
          
          print(f'latex_matrix={json.dumps({\"include\": latex_entries})}')
          print(f'has_latex={str(len(latex_entries) > 0).lower()}')
          print(f'typst_matrix={json.dumps({\"include\": typst_entries})}')
          print(f'has_typst={str(len(typst_entries) > 0).lower()}')
          " >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Compile each LaTeX template
  # ---------------------------------------------------------------------------
  compile-latex:
    name: "Compile: ${{ matrix.id }}"
    needs: discover
    runs-on: ubuntu-latest
    if: ${{ needs.discover.outputs.has_latex == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.latex_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Compile ${{ matrix.id }}
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ matrix.main_file }}
          working_directory: ${{ matrix.source_dir }}
          # Use lualatex if specified, otherwise pdflatex (default)
          latexmk_use_lualatex: ${{ matrix.compiler == 'lualatex' }}
          latexmk_use_xelatex: ${{ matrix.compiler == 'xelatex' }}
          # Add shared/latex/ to TEXINPUTS so \usepackage{apograph-math} works
          pre_compile: |
            export TEXINPUTS=".:${GITHUB_WORKSPACE}/shared/latex//:"
          extra_system_packages: |
            zip

      - name: Upload compiled PDF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-${{ matrix.id }}
          path: |
            ${{ matrix.source_dir }}/*.pdf
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Compile each Typst template (when you add Typst templates)
  # ---------------------------------------------------------------------------
  # compile-typst:
  #   name: "Compile: ${{ matrix.id }}"
  #   needs: discover
  #   runs-on: ubuntu-latest
  #   if: ${{ needs.discover.outputs.has_typst == 'true' }}
  #   strategy:
  #     fail-fast: false
  #     matrix: ${{ fromJson(needs.discover.outputs.typst_matrix) }}
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: typst-community/setup-typst@v4
  #     - name: Compile ${{ matrix.id }}
  #       run: typst compile ${{ matrix.source_dir }}/${{ matrix.main_file }}
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: pdf-${{ matrix.id }}
  #         path: ${{ matrix.source_dir }}/*.pdf

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Compilation summary
    needs: [compile-latex]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Compilation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.compile-latex.result }}" == "success" ]; then
            echo "[SUCCESS] All LaTeX templates compiled successfully" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ needs.compile-latex.result }}" == "skipped" ]; then
            echo "[SUCCESS] No beta/stable LaTeX templates are currently eligible for compilation" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "[ERROR] Some LaTeX templates failed to compile" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
