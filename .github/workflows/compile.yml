name: Compile Templates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: compile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalog:
    name: Catalog and discovery
    runs-on: ubuntu-latest
    outputs:
      latex_matrix: ${{ steps.matrix.outputs.latex_matrix }}
      has_latex: ${{ steps.matrix.outputs.has_latex }}
      typst_matrix: ${{ steps.matrix.outputs.typst_matrix }}
      has_typst: ${{ steps.matrix.outputs.has_typst }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate catalog and generated documentation
        run: |
          python3 scripts/catalog.py validate
          python3 scripts/catalog.py generate-readme --check

      - name: Build matrices from validated catalog data
        id: matrix
        run: python3 scripts/catalog.py ci-matrix >> "$GITHUB_OUTPUT"

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: |
          python3 -m unittest discover -s tests -v
          python3 -m py_compile scripts/*.py
          bash -n scripts/use.sh

  source-compile:
    name: "Source compile: ${{ matrix.id }}"
    needs: catalog
    runs-on: ubuntu-latest
    if: ${{ needs.catalog.outputs.has_latex == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.catalog.outputs.latex_matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Compile source entry point
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # v4
        with:
          texlive_version: 2026
          root_file: ${{ matrix.main_file }}
          working_directory: ${{ matrix.source_dir }}
          latexmk_use_lualatex: ${{ matrix.compiler == 'lualatex' }}
          latexmk_use_xelatex: ${{ matrix.compiler == 'xelatex' }}
          pre_compile: export TEXINPUTS=".:${GITHUB_WORKSPACE}/shared/latex//:"

  artifact-build:
    name: Packed artifact gate
    needs: [catalog, python-tests, source-compile]
    runs-on: ubuntu-latest
    if: >-
      ${{ always() &&
          needs.catalog.result == 'success' &&
          needs.python-tests.result == 'success' &&
          (needs.source-compile.result == 'success' ||
           needs.source-compile.result == 'skipped') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Test and build canonical artifacts in TeX Live 2026
        uses: xu-cheng/texlive-action@22c04326a5d855880f9d39bb955138bf11c6df80 # v3
        with:
          texlive_version: 2026
          os: alpine
          scheme: full
          run: |
            apk add --no-cache git python3
            python3 -m unittest discover -s tests -v
            python3 scripts/pack.py --all --mode release \
              --source-commit "$GITHUB_SHA" --out build/ci
            python3 scripts/release.py assemble --build-dir build/ci \
              --source-commit "$GITHUB_SHA"

      - name: Upload exact tested release candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-${{ github.sha }}
          path: build/ci/*
          if-no-files-found: error
          retention-days: 14

  summary:
    name: Pipeline summary
    needs: [catalog, python-tests, source-compile, artifact-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report required job results
        run: |
          {
            echo "## Apograph validation"
            echo
            echo "- Catalog: ${{ needs.catalog.result }}"
            echo "- Python tests: ${{ needs.python-tests.result }}"
            echo "- Source compilation: ${{ needs.source-compile.result }}"
            echo "- Packed artifact: ${{ needs.artifact-build.result }}"
          } >> "$GITHUB_STEP_SUMMARY"

          test "${{ needs.catalog.result }}" = "success"
          test "${{ needs.python-tests.result }}" = "success"
          test "${{ needs.artifact-build.result }}" = "success"
          test "${{ needs.source-compile.result }}" = "success" \
            || test "${{ needs.source-compile.result }}" = "skipped"
