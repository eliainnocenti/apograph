name: Publish CLI to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact apograph-templates version to publish"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify Python distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Require the protected main source
        run: test "$GITHUB_REF" = "refs/heads/main"

      - name: Match the requested and authored CLI versions
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          actual="$(PYTHONPATH=src python3 -m apograph_templates --version)"
          test "$actual" = "apograph-templates $REQUESTED_VERSION"

      - name: Test and build distributions
        run: |
          python3 -m unittest discover -s tests -v
          python3 -m pip install --disable-pip-version-check build==1.3.0
          python3 -m build
          python3 -m pip install --no-deps dist/*.whl
          apograph --version

      - name: Upload distributions for the isolated publisher
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/apograph-templates
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download exactly the distributions built above
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/

      - name: Publish with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
