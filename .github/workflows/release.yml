# =============================================================================
# release.yml — Build and publish template ZIPs on tag push.
#
# Triggered when you push a tag like v0.1.0.
# Runs the canonical artifact builder and attaches its verified outputs to a
# GitHub Release. Phase 4 will replace this transitional runner with the full
# supported-toolchain matrix.
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate catalog and generated documentation
        run: |
          python3 scripts/catalog.py validate
          python3 scripts/catalog.py generate-readme --check

      # ------------------------------------------------------------------
      # Build all public templates. pack.py performs isolated compilation and
      # derives previews from the packed source; failures are publication blockers.
      # ------------------------------------------------------------------
      - name: Build verified release artifacts
        run: >-
          python3 scripts/pack.py --all --mode release
          --source-commit "$GITHUB_SHA" --out build/

      # ------------------------------------------------------------------
      # Create GitHub Release
      # ------------------------------------------------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/*.zip
            build/*.zip.sha256
            build/*.build.json
            build/*.preview.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # Summary
      # ------------------------------------------------------------------
      - name: Release summary
        run: |
          echo "## Release ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### ZIPs" >> "$GITHUB_STEP_SUMMARY"
          ls -la build/*.zip | awk '{print "- " $NF " (" $5 " bytes)"}' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Preview PDFs" >> "$GITHUB_STEP_SUMMARY"
          find build -maxdepth 1 -name "*.preview.pdf" -print | awk '{print "- " $0}' >> "$GITHUB_STEP_SUMMARY"
