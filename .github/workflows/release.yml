name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  candidate:
    name: Build release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate catalog and generated documentation
        run: |
          python3 scripts/catalog.py validate
          python3 scripts/catalog.py generate-readme --check

      - name: Validate publication tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: python3 scripts/release.py validate-tag --tag "$GITHUB_REF_NAME"

      - name: Build and verify release outputs in TeX Live 2026
        uses: xu-cheng/texlive-action@22c04326a5d855880f9d39bb955138bf11c6df80 # v3
        with:
          texlive_version: 2026
          os: alpine
          scheme: full
          run: |
            apk add --no-cache git python3
            git config --global --add safe.directory "$GITHUB_WORKSPACE"
            python3 -m unittest discover -s tests -v
            python3 scripts/pack.py --all --mode release \
              --source-commit "$GITHUB_SHA" --out build/release
            tag_args=()
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              tag_args=(--tag "$GITHUB_REF_NAME")
            fi
            python3 scripts/release.py assemble --build-dir build/release \
              --source-commit "$GITHUB_SHA" "${tag_args[@]}"

      - name: Upload unpublished candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-${{ github.sha }}
          path: build/release/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish verified tag artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: build/release/*

      - name: Release summary
        run: |
          {
            echo "## Release candidate"
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Ref: \`$GITHUB_REF_NAME\`"
            echo "- Published: ${{ startsWith(github.ref, 'refs/tags/v') }}"
            echo
            echo "### Files"
            find build/release -maxdepth 1 -type f -print \
              | sed 's#build/release/#- #g' | sort
          } >> "$GITHUB_STEP_SUMMARY"
